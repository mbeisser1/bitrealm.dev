<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bitrealm.dev</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #f4f4f5;
      text-align: center;
    }
    main {
      padding: 2rem;
      max-width: 600px;
    }
    .pre-title {
      font-size: 0.9rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .hero-title {
      font-size: 3.5rem;
      font-weight: 800;
      margin: 0 0 2rem 0;
      letter-spacing: -0.02em;
    }
    .auth-text {
      font-size: 0.9rem;
      color: #999;
      margin-top: 2rem;
      font-weight: 400;
    }
    footer {
      position: absolute;
      bottom: 2rem;
    }
    footer a {
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
    }
    footer a:hover { color: #000; }
  </style>
</head>
<body>
  <main>
    <div class="pre-title">Email host for</div>
    <h1 class="hero-title">bitrealm.dev</h1>
  </main>

  <footer>
    <a href="mailto:contact@bitrealm.dev">contact@bitrealm.dev</a>
  </footer>
</body>
</html>
